  <style>
    :root {
      --bg: #eef1f6;
      --ink: #1f2742;
      --accent: #2563a6;
      --line: #d8deea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 14px 22px;
      background: rgba(255,255,255,.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
      overflow-x: auto;
    }
    .nav a, .nav button {
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
      border: 0;
      background: transparent;
      cursor: pointer;
      font: inherit;
      white-space: nowrap;
    }
    .deck {
      width: min(1540px, calc(100vw - 42px));
      margin: 28px auto 54px;
      display: grid;
      gap: 30px;
    }
    .slide {
      position: relative;
      margin: 0 auto;
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: auto;
      padding: 0;
      background: #111827;
      border: 1px solid rgba(20,32,54,.18);
      box-shadow: 0 18px 44px rgba(25,39,70,.14);
      overflow: hidden;
    }
    .slide-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #111827;
    }
    .page {
      position: absolute;
      right: 18px;
      bottom: 14px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(8,16,32,.62);
      color: rgba(255,255,255,.86);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .slideshow-ui {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      display: flex;
      gap: 8px;
      padding: 8px;
      border-radius: 12px;
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      box-shadow: 0 12px 30px rgba(20,32,54,.18);
    }
    .slideshow-ui button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 10px;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
